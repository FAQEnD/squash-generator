<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Генератор матчів (з seed)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; max-width: 900px; margin: auto; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, textarea {
            width: 100%; padding: 12px; font-size: 16px;
            border-radius: 6px; border: 1px solid #aaa;
        }
        button {
            width: 100%; padding: 12px; margin-top: 12px; font-size: 17px;
            border-radius: 8px; border: none; font-weight: bold;
            background: #0078ff; color: #fff;
        }
        button:hover { background: #005fcc; }
        .secondary-btn { background: #444 !important; }
        #playerSelect { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .player-checkbox { display: flex; align-items: center; gap: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
        .table-wrapper { overflow-x: auto; }
        .section-title { font-size: 20px; margin-top: 30px; font-weight: bold; }
        .download-buttons {
            display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;
        }
        .download-buttons button { flex: 1; }
    </style>
</head>
<body>

<h2>Генератор турнірного розкладу</h2>

<!-- Seed -->
<label>Seed:</label>
<input id="seedInput" type="text" placeholder="Seed генерується автоматично">

<button class="secondary-btn" onclick="shareLink()">Поділитися посиланням із seed</button>

<!-- Players -->
<label>Оберіть гравців:</label>
<div id="playerSelect">
    <label class="player-checkbox"><input type="checkbox" value="Антон"> Антон</label>
    <label class="player-checkbox"><input type="checkbox" value="Іра"> Іра</label>
    <label class="player-checkbox"><input type="checkbox" value="Юля"> Юля</label>
    <label class="player-checkbox"><input type="checkbox" value="Олександр"> Олександр</label>
    <label class="player-checkbox"><input type="checkbox" value="Назар"> Назар</label>
    <label class="player-checkbox"><input type="checkbox" value="Тарас"> Тарас</label>
    <label class="player-checkbox"><input type="checkbox" value="Люба"> Люба</label>
    <label class="player-checkbox"><input type="checkbox" value="Анатолій"> Анатолій</label>
</div>

<label>Кількість турів:</label>
<input id="rounds" type="number" value="8">

<label>Кількість матчів у турі:</label>
<input id="matchesPerRound" type="number" value="2" min="1">

<button onclick="generate()">Згенерувати</button>

<div class="download-buttons" id="downloadArea" style="display:none;">
    <button class="secondary-btn" onclick="downloadCSV()">Завантажити CSV</button>
    <button class="secondary-btn" onclick="downloadHTML()">Завантажити HTML</button>
</div>

<div id="results"></div>

<script>
// ----------- Seedable RNG ------------
function mulberry32(seed) {
    return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// ----------- Автоматичний seed при старті ------------
function generateInitialSeed() {
    let seed = Math.floor(Math.random() * 1e12);
    document.getElementById("seedInput").value = seed;
}

// ----------- Поділитися seed через URL -------------
function shareLink() {
    let seed = document.getElementById("seedInput").value.trim();
    let rounds = document.getElementById("rounds").value;
    let matches = document.getElementById("matchesPerRound").value;
    let players = Array.from(document.querySelectorAll("#playerSelect input:checked"))
        .map(cb => cb.value);

    let params = new URLSearchParams();
    params.set("seed", seed);
    params.set("players", players.join(","));
    params.set("rounds", rounds);
    params.set("matches", matches);

    let url = window.location.origin + window.location.pathname + "?" + params.toString();

    navigator.clipboard.writeText(url).then(() => {
        alert("Посилання скопійовано:\n" + url);
    });
}

// ----------- Зчитування з URL (автозавантаження) -------------
(function loadFromURL() {
    let params = new URLSearchParams(window.location.search);

    if (params.has("seed")) document.getElementById("seedInput").value = params.get("seed");
    else generateInitialSeed(); // seed за замовчуванням

    if (params.has("rounds")) document.getElementById("rounds").value = params.get("rounds");
    if (params.has("matches")) document.getElementById("matchesPerRound").value = params.get("matches");

    if (params.has("players")) {
        let list = params.get("players").split(",");
        for (let name of list) {
            let cb = document.querySelector(`#playerSelect input[value="${name}"]`);
            if (cb) cb.checked = true;
        }
    }

    if (params.has("seed")) generate(); // авто-генерація при відкритті лінка
})();

// ----------- Основна логіка генерації ------------
let lastGeneratedHTML = "";

function generate() {
    let seed = document.getElementById("seedInput").value.trim();
    if (!seed) { alert("Seed пустий!"); return; }

    let rand = mulberry32(parseInt(seed));

    let players = Array.from(document.querySelectorAll("#playerSelect input:checked"))
        .map(cb => cb.value);

    if (players.length < 2) {
        alert("Оберіть мінімум 2 гравців!");
        return;
    }

    let numRounds = parseInt(document.getElementById("rounds").value);
    let maxParallel = parseInt(document.getElementById("matchesPerRound").value);

    // Детерміноване перемішування
    players = players.sort(() => rand() - 0.5);

    let gamesPlayed = {};
    let pairPlayed = {};
    players.forEach(p => gamesPlayed[p] = 0);

    let schedule = [];
    let restingList = [];

    for (let r = 0; r < numRounds; r++) {
        let used = new Set();
        let roundMatches = [];

        let sortedPlayers = [...players].sort((a, b) => gamesPlayed[a] - gamesPlayed[b]);

        for (let p1 of sortedPlayers) {
            if (used.has(p1)) continue;

            let candidates = sortedPlayers.filter(
                p2 => p2 !== p1 && !used.has(p2)
            );

            candidates.sort((a, b) => {
                let pa = (pairPlayed[p1 + "-" + a] || 0);
                let pb = (pairPlayed[p1 + "-" + b] || 0);
                if (pa !== pb) return pa - pb;
                return gamesPlayed[a] - gamesPlayed[b];
            });

            if (candidates.length > 0) {
                let p2 = candidates[0];

                roundMatches.push([p1, p2]);
                used.add(p1);
                used.add(p2);

                gamesPlayed[p1]++;
                gamesPlayed[p2]++;

                pairPlayed[p1 + "-" + p2] = (pairPlayed[p1 + "-" + p2] || 0) + 1;
                pairPlayed[p2 + "-" + p1] = (pairPlayed[p2 + "-" + p1] || 0) + 1;
            }

            if (roundMatches.length >= maxParallel) break;
        }

        schedule.push(roundMatches);
        restingList.push(players.filter(p => !used.has(p)));
    }

    // HTML таблиця
    let html = `<div class='section-title'>Розклад матчів</div>`;
    html += `<div class='table-wrapper'><table><tr><th>Тур</th>`;

    for (let i = 1; i <= maxParallel; i++) html += `<th>Матч ${i}</th>`;
    html += `<th>Відпочивають</th></tr>`;

    schedule.forEach((matches, i) => {
        html += `<tr><td>${i + 1}</td>`;
        for (let m = 0; m < maxParallel; m++) {
            html += matches[m]
                ? `<td>${matches[m][0]} vs ${matches[m][1]}</td>`
                : `<td></td>`;
        }
        html += `<td>${restingList[i].join(", ")}</td></tr>`;
    });

    html += `</table></div>`;

    document.getElementById("results").innerHTML = html;
    document.getElementById("downloadArea").style.display = "flex";
    lastGeneratedHTML = html;
}

// ----------- CSV / HTML Завантаження ------------
function downloadCSV() {
    let table = document.querySelector("#results table");
    let csv = [...table.querySelectorAll("tr")].map(tr =>
        [...tr.children].map(td => td.textContent).join(";")
    ).join("\n");

    let blob = new Blob([csv], { type: "text/csv" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "schedule.csv";
    a.click();
}

function downloadHTML() {
    let blob = new Blob([lastGeneratedHTML], { type: "text/html" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "schedule.html";
    a.click();
}
</script>

</body>
</html>
