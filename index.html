<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, maximum-scale=1">
<title>Match Generator</title>

<style>
    body { font-family:-apple-system, BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; margin:0; background:#f5f5f5; }
    header { background:#222; color:white; padding:16px; text-align:center; }
    main { padding:16px; max-width:1000px; margin:auto; }
    h2 { margin-top:28px; font-size:1.3rem; }

    .players-grid {
        display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:10px;
    }
    label { display:flex; align-items:center; gap:10px; font-size:1rem; }

    input[type=checkbox] {
        width:24px; height:24px; -webkit-appearance:none; appearance:none;
        border:2px solid #444; border-radius:6px; background:white; position:relative;
    }
    input[type=checkbox]:checked { background:#007aff; border-color:#007aff; }
    input[type=checkbox]:checked::after {
        content:"✓"; color:white; font-size:18px;
        position:absolute; top:-2px; left:4px;
    }

    .controls { display:grid; gap:14px; max-width:340px; }
    .controls label { justify-content:space-between; }

    input[type=number],input[type=text]{
        width:140px; padding:8px; border:1px solid #aaa; border-radius:6px; background:white;
        font-size:1rem;
    }

    .row { display:flex; flex-wrap:wrap; gap:12px; margin-top:20px; }

    button {
        width:100%; padding:14px 16px; font-size:1.05rem; font-weight:600;
        background:#007aff; color:white; border:none; border-radius:10px; cursor:pointer;
    }
    button:active { opacity:.75; }

    .export-btn { background:#222 !important; }
    .share-btn { background:#444 !important; }

    .export-row { display:flex; gap:12px; width:100%; }
    .export-row button { flex:1; }

    .hidden { display:none !important; }

    table {
        width:100%; border-collapse:collapse; background:white;
        margin-top:20px; font-size:.95rem;
    }
    th,td {
        border:1px solid #ccc; padding:8px; text-align:center; word-break:break-word;
    }

    .highlight-pair { background:#ffe0e0; font-weight:bold; }

    @media(max-width:600px){
        input[type=number],input[type=text]{ width:110px; }
        .controls{ max-width:100%; }
        button{ font-size:1rem; }
        table{ font-size:.82rem; }
        .export-row{ flex-direction:column; }
    }

    @media print {
        body * { visibility:hidden !important; }
        #tableBox,#tableBox * { visibility:visible !important; }
        #tableBox{ position:absolute; top:0; left:0; width:100%; }
    }
</style>
</head>
<body>

<header><h1>Генератор матчів</h1></header>
<main>

<h2>Гравці</h2>
<div class="players-grid" id="players"></div>

<h2>Параметри</h2>
<div class="controls">
    <label>Кількість ігор <input id="games" type="number" min="1" value="8"></label>
    <label>Кількість кортів <input id="courts" type="number" min="1" value="2"></label>
    <label>Початок ігрової сесії <input id="startTime" type="time" value="18:40"></label>

    <label>Seed <input id="seed" type="text" readonly></label>
</div>

<div class="row">
    <button onclick="generate()">Згенерувати</button>
</div>

<div class="row hidden" id="afterGenRow">
    <div class="export-row">
        <button class="export-btn" onclick="exportCSV()">Експорт CSV</button>
        <button class="export-btn" onclick="window.print()">Експорт PDF</button>
    </div>
    <button class="share-btn" onclick="shareLink()">Поділитися</button>
</div>

<h2>Результат</h2>
<div id="tableBox"></div>

<h2>Статистика</h2>
<div style="background:white;padding:12px;border-radius:8px;">
    <div id="statsPlayers"></div>
    <div id="statsPairs" style="margin-top:10px;"></div>
</div>

</main>

<script>

/* ============================================================
   SEEDED RNG
============================================================ */
function mulberry32(a){
    return function(){
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function seededShuffle(arr, r){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(r() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

/* ============================================================
   DATA
============================================================ */
const PLAYER_LIST = [
    "Антон","Іра","Олександр","Юля",
    "Назар","Тарас","Люба","Анатолій"
];

const DEFAULT_SELECTED = new Set(["Антон","Іра","Олександр","Юля","Назар"]);

/* ============================================================
   INIT PLAYERS
============================================================ */
function initPlayers(){
    const box = document.getElementById("players");
    PLAYER_LIST.forEach(p=>{
        const checked = DEFAULT_SELECTED.has(p) ? "checked" : "";
        box.insertAdjacentHTML("beforeend",
            `<label><input type="checkbox" id="p_${p}" ${checked}><span>${p}</span></label>`
        );
    });
}

/* ============================================================
   LOAD FROM URL
============================================================ */
function loadFromURL(){
    const url = new URL(window.location.href);
    let hasParams = false;

    if(url.searchParams.has("seed")){
        hasParams = true;
        document.getElementById("seed").value = url.searchParams.get("seed");
    }

    if(url.searchParams.has("players")){
        hasParams = true;
        PLAYER_LIST.forEach(p => document.getElementById("p_"+p).checked = false);
        url.searchParams.get("players").split(",").forEach(p=>{
            const el = document.getElementById("p_"+p);
            if(el) el.checked = true;
        });
    }

    if(url.searchParams.has("games")){
        hasParams = true;
        document.getElementById("games").value = url.searchParams.get("games");
    }

    if(url.searchParams.has("courts")){
        hasParams = true;
        document.getElementById("courts").value = url.searchParams.get("courts");
    }

    return hasParams;
}

/* ============================================================
   AUTO SEED
============================================================ */
function autoSeed(){
    document.getElementById("seed").value = Math.floor(Math.random()*1e9).toString();
}

/* ============================================================
   NEW — BALANCED PLAYER PICKER
============================================================ */

function scoreCandidateDistribution(cand, playerCount){
    let s = 0;
    for(let p of cand) s += playerCount[p] || 0;
    return s;
}

function chooseBalancedPlayers(players, courts, r, pairCount, recentPairs, playerCount){
    const needed = courts * 2;
    const attempts = 400;

    let best = null;
    let bestScore = Infinity;

    for(let i=0; i<attempts; i++){
        let t = [...players];
        seededShuffle(t, r);

        let cand = t.slice(0, needed);
        let score = 0;

        for(let k=0; k<cand.length; k+=2){
            const A=cand[k], B=cand[k+1];
            const key = A < B ? A+"-"+B : B+"-"+A;

            if(recentPairs.includes(key)) score += 500;
            score += (pairCount[key] || 0) * 15;
        }

        score += scoreCandidateDistribution(cand, playerCount) * 3;

        if(score < bestScore){
            bestScore = score;
            best = cand;
        }
    }
    return best;
}

/* ============================================================
   GENERATE
============================================================ */
function generate(){
    const seed = parseInt(document.getElementById("seed").value) || 1;
    const r = mulberry32(seed);

    const games  = +document.getElementById("games").value;
    const courts = +document.getElementById("courts").value;
    const avoidN = 2;

    const players = PLAYER_LIST.filter(p => document.getElementById("p_"+p).checked);

    if(players.length < courts * 2){
        alert("Замало гравців!");
        return;
    }

    const pairCount = {};
    const playerCount = {};
    players.forEach(p => playerCount[p] = 0);

    const recentPairs = [];
    const results = [];

    for(let g=1; g<=games; g++){

        const chosen = chooseBalancedPlayers(
            players,
            courts,
            r,
            pairCount,
            recentPairs,
            playerCount
        );

        const used = new Set(chosen);
        const rest = players.filter(p => !used.has(p));

        const pairs = [];

        for(let c=0; c<courts; c++){
            const A = chosen[2*c];
            const B = chosen[2*c+1];

            const key = A < B ? A+"-"+B : B+"-"+A;

            pairCount[key] = (pairCount[key] || 0) + 1;
            recentPairs.push(key);

            pairs.push([A,B]);

            playerCount[A]++;
            playerCount[B]++;
        }

        while(recentPairs.length > avoidN * courts)
            recentPairs.shift();

        results.push({ game:g, pairs, rest });
    }

    window._pairCount = pairCount;

    renderTable(results);
    renderStats(playerCount, pairCount);

    document.getElementById("afterGenRow").classList.remove("hidden");
}

function renderTable(results){
    const courts = +document.getElementById("courts").value;
    const pc = window._pairCount || {};

    /* Read starting time */
    const start = document.getElementById("startTime").value; // "18:40"
    let [sh, sm] = start.split(":").map(Number);
    let currentMinutes = sh * 60 + sm;

    const GAME_DURATION = 10; // 10 minutes per slot

    let html = `<table><tr><th>Час</th>`;
    for(let c=1; c<=courts; c++) html += `<th>Корт ${c}</th>`;
    html += `<th>Відпочивають</th></tr>`;

    results.forEach(r=>{
        const from = currentMinutes;
        const to   = currentMinutes + GAME_DURATION;

        const timeLabel = `${formatTime(from)}–${formatTime(to)}`;
        currentMinutes = to;

        html += `<tr><td>${timeLabel}</td>`;

        r.pairs.forEach(p=>{
            html += `<td>${p[0]} – ${p[1]}</td>`;
        });

        html += `<td>${r.rest.join(", ")}</td></tr>`;
    });

    html += "</table>";
    document.getElementById("tableBox").innerHTML = html;
}


/* ============================================================
   Converts minutes → HH:MM
============================================================ */
function formatTime(totalMinutes){
    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}



/* ============================================================
   RENDER STATS
============================================================ */
function renderStats(playerCount, pairCount){
    let p = "<h3>Ігри гравців</h3><ul>";
    for(const pl in playerCount)
        p+=`<li>${pl}: ${playerCount[pl]}</li>`;
    p+="</ul>";

    let s="<h3>Статистика пар</h3><ul>";
    for(const k in pairCount)
        s+=`<li>${k}: ${pairCount[k]}×</li>`;
    s+="</ul>";

    document.getElementById("statsPlayers").innerHTML = p;
    document.getElementById("statsPairs").innerHTML = s;
}

/* ============================================================
   EXPORT CSV
============================================================ */
function exportCSV(){
    const table = document.querySelector("#tableBox table");
    if(!table) return;

    let csv="";
    table.querySelectorAll("tr").forEach(row=>{
        csv += [...row.children]
            .map(td=>`"${td.innerText}"`)
            .join(",") + "\n";
    });

    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="matches.csv";
    a.click();
}

/* ============================================================
   SHAREABLE LINK
============================================================ */
function shareLink(){
    const seed=document.getElementById("seed").value;
    const games=document.getElementById("games").value;
    const courts=document.getElementById("courts").value;

    const players=PLAYER_LIST.filter(p=>document.getElementById("p_"+p).checked);

    const url=new URL(window.location.href);
    url.searchParams.set("seed",seed);
    url.searchParams.set("games",games);
    url.searchParams.set("courts",courts);
    url.searchParams.set("players",players.join(","));

    navigator.clipboard.writeText(url.toString());
    alert("Посилання скопійовано!");
}

/* ============================================================
   INIT
============================================================ */
initPlayers();
autoSeed();
if(loadFromURL()) generate();

</script>

</body>
</html>
