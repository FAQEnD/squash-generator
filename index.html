<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Генератор матчів (стабільна версія)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; padding: 10px; max-width: 900px; margin: auto; }
    h2 { margin: 8px 0 12px; }

    label { font-weight: bold; display: block; margin-top: 14px; }
    input, textarea {
      width: 100%; padding: 12px; font-size: 16px;
      border: 1px solid #aaa; border-radius: 6px; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 12px; margin-top: 10px; font-size: 16px;
      border: none; border-radius: 8px; font-weight: 600; background: #0078ff; color: #fff;
    }
    button:hover { background: #005fcc; }
    .secondary-btn { background: #444; }
    .secondary-btn:hover { background: #222; }

    #playerSelect { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    /* iPhone checkbox fix */
    .player-checkbox { display: flex; align-items: center; gap: 8px; font-size: 17px; }
    .player-checkbox input[type="checkbox"] {
      width: 22px; height: 22px; margin: 0; padding: 0;
      -webkit-appearance: none; appearance: none;
      border: 2px solid #555; border-radius: 4px; background: #fff; position: relative; cursor: pointer;
    }
    .player-checkbox input[type="checkbox"]:checked::after {
      content: "✔"; font-size: 17px; color: #0078ff; position: absolute; top: -2px; left: 3px;
    }

    .download-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .download-buttons button { flex: 1; }

    .section-title { margin-top: 18px; font-size: 20px; font-weight: bold; }

    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; font-size: 15px; }
    th { background: #f2f2f2; }

    /* Друк: показуємо тільки таблицю */
    @media print {
      body * { visibility: hidden; }
      #results, #results * { visibility: visible; }
      #results { position: absolute; top: 0; left: 0; width: 100%; }
      table { font-size: 14px; }
    }
  </style>
</head>
<body>
  <h2>Генератор турнірного розкладу</h2>

  <!-- Seed -->
  <label>Seed:</label>
  <input id="seedInput" type="text" placeholder="Seed генерується автоматично" />
  <button class="secondary-btn" onclick="shareLink()">Поділитися посиланням із seed</button>
  <button class="secondary-btn" onclick="generateRandomSeed()">Випадковий seed</button>

  <!-- Players -->
  <label>Оберіть гравців:</label>
  <div id="playerSelect">
    <label class="player-checkbox"><input type="checkbox" value="Антон"> Антон</label>
    <label class="player-checkbox"><input type="checkbox" value="Іра"> Іра</label>
    <label class="player-checkbox"><input type="checkbox" value="Юля"> Юля</label>
    <label class="player-checkbox"><input type="checkbox" value="Олександр"> Олександр</label>
    <label class="player-checkbox"><input type="checkbox" value="Назар"> Назар</label>
    <label class="player-checkbox"><input type="checkbox" value="Тарас"> Тарас</label>
    <label class="player-checkbox"><input type="checkbox" value="Люба"> Люба</label>
    <label class="player-checkbox"><input type="checkbox" value="Анатолій"> Анатолій</label>
  </div>

  <label>Кількість ігор:</label>
  <input id="rounds" type="number" value="8" min="1" />

  <label>Кількість кортів у грі:</label>
  <input id="matchesPerRound" type="number" value="2" min="1" />

  <button onclick="generate()">Згенерувати</button>

  <div class="download-buttons" id="downloadArea" style="display:none;">
    <button class="secondary-btn" onclick="downloadCSV()">Завантажити CSV</button>
    <button class="secondary-btn" onclick="window.print()">Експорт у PDF</button>
  </div>

  <div id="results"></div>

  <script>
    // ===============================
    // 1) Seedable RNG (детермінований)
    // ===============================
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function seededShuffle(arr, rand) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ===============================
    // 2) Balanced slots (рівномірний добір унікальних гравців у кожну гру)
    // ===============================
    function buildBalancedSlots(players, numGames, courts, seed) {
      const rand = mulberry32(seed);
      const n = players.length;

      // Реальна кількість кортів, яку можемо задіяти (мін. 2 гравці на корт)
      const activeCourts = Math.min(courts, Math.floor(n / 2));
      const playersPerGame = activeCourts * 2;

      if (playersPerGame === 0) {
        return { slots: Array.from({ length: numGames }, () => []), activeCourts: 0 };
      }

      const appearances = Object.fromEntries(players.map(p => [p, 0])); // скільки разів включили в ігри
      const lastPlayed  = Object.fromEntries(players.map(p => [p, -Infinity])); // індекс останньої гри

      const baseOrder = seededShuffle(players, rand);
      const slots = Array.from({ length: numGames }, () => []);

      for (let g = 0; g < numGames; g++) {
        const selected = new Set();

        for (let k = 0; k < playersPerGame; k++) {
          const candidates = baseOrder.filter(p => !selected.has(p));

          candidates.sort((a, b) => {
            if (appearances[a] !== appearances[b]) return appearances[a] - appearances[b];
            if (lastPlayed[a]  !== lastPlayed[b])  return lastPlayed[a]  - lastPlayed[b];
            return rand() - 0.5;
          });

          const pick = candidates[0];
          selected.add(pick);
          appearances[pick] += 1;
          lastPlayed[pick] = g;
        }

        slots[g] = Array.from(selected);
      }

      return { slots, activeCourts };
    }

    // ===============================
    // 3) ПАРИ: мінімізуємо повтори, уникаємо рематчів підряд
    // ===============================
    function buildPairs(slots, activeCourts, allPlayers, seed) {
      const rand = mulberry32(seed + 10000);
      const schedule = [];
      const resting  = [];

      const pairCount    = {}; // "A-B" → скільки разів грали
      const pairLastGame = {}; // "A-B" → індекс останньої гри
      const key = (a, b) => (a < b ? `${a}-${b}` : `${b}-${a}`);

      for (let g = 0; g < slots.length; g++) {
        const pool  = seededShuffle(slots[g], rand);
        const pairs = [];

        const needPairs = Math.min(activeCourts, Math.floor(pool.length / 2));

        while (pairs.length < needPairs && pool.length >= 2) {
          const p1 = pool.shift();

          const candidates = pool.slice();
          candidates.sort((a, b) => {
            const ka = key(p1, a);
            const kb = key(p1, b);

            const ca = pairCount[ka] || 0;
            const cb = pairCount[kb] || 0;
            if (ca !== cb) return ca - cb;

            const la = pairLastGame[ka] ?? -Infinity;
            const lb = pairLastGame[kb] ?? -Infinity;
            if (la !== lb) return la - lb;

            return rand() - 0.5;
          });

          const p2 = candidates[0];
          pairs.push([p1, p2]);

          const kpair = key(p1, p2);
          pairCount[kpair]    = (pairCount[kpair] || 0) + 1;
          pairLastGame[kpair] = g;

          const idx = pool.indexOf(p2);
          if (idx >= 0) pool.splice(idx, 1);
        }

        schedule.push(pairs);

        // Відпочивають: усі обрані гравці мінус ті, що зіграли у цій грі
        const used = new Set(pairs.flat());
        resting.push(allPlayers.filter(p => !used.has(p)));
      }

      return { schedule, resting };
    }

    // ===============================
    // 4) ГОЛОВНА: зчитує UI → генерує → малює таблицю
    // ===============================
    function generate() {
      const seedStr = document.getElementById("seedInput").value.trim();
      const seedNum = parseInt(seedStr, 10);
      if (!Number.isFinite(seedNum)) {
        alert("Seed має бути числом (наприклад 12345).");
        return;
      }

      const players = Array.from(document.querySelectorAll("#playerSelect input:checked"))
        .map(cb => cb.value);

      if (players.length < 2) {
        alert("Оберіть мінімум 2 гравців!");
        return;
      }

      const numGamesInput = parseInt(document.getElementById("rounds").value, 10);
      const courtsInput   = parseInt(document.getElementById("matchesPerRound").value, 10);

      const numGames = Math.max(1, numGamesInput);
      const courts   = Math.max(1, courtsInput);

      // 1) Слоти: рівномірно формуємо унікальних гравців на гру
      const { slots, activeCourts } = buildBalancedSlots(players, numGames, courts, seedNum);

      // 2) Пари в кожній грі
      const { schedule, resting } = buildPairs(slots, activeCourts, players, seedNum);

      // 3) Таблиця
      let html = `<div class='section-title'>Розклад матчів</div>`;

      if (activeCourts < courts) {
        html += `<p style="margin:8px 0;color:#a00;">
          Увага: замало гравців для обраної кількості кортів.
          Використано фактично: <b>${activeCourts}</b> корт(и/ів).
        </p>`;
      }

      html += `<div class="table-wrapper"><table><tr><th>Гра</th>`;
      for (let i = 1; i <= activeCourts; i++) html += `<th>Корт ${i}</th>`;
      html += `<th>Відпочивають</th></tr>`;

      for (let g = 0; g < numGames; g++) {
        html += `<tr><td>${g + 1}</td>`;

        const pairs = schedule[g] || [];
        for (let c = 0; c < activeCourts; c++) {
          if (pairs[c]) {
            const [a, b] = pairs[c];
            html += `<td>${a} vs ${b}</td>`;
          } else {
            html += `<td></td>`;
          }
        }

        const used = new Set((pairs || []).flat());
        const rest = players.filter(p => !used.has(p));
        html += `<td>${rest.join(", ")}</td>`;

        html += `</tr>`;
      }

      html += `</table></div>`;

      document.getElementById("results").innerHTML = html;
      const dl = document.getElementById("downloadArea");
      if (dl) dl.style.display = "flex";
      window.lastGeneratedHTML = html;
    }

    // ===============================
    // 5) Допоміжні: CSV, Share, Seed
    // ===============================
    function downloadCSV() {
      const table = document.querySelector("#results table");
      if (!table) return;
      const csv = [...table.querySelectorAll("tr")].map(tr =>
        [...tr.children].map(td => td.textContent).join(";")
      ).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "schedule.csv";
      a.click();
    }

    function generateRandomSeed() {
      const seed = Math.floor(Math.random() * 1e12);
      document.getElementById("seedInput").value = seed;
    }

    function shareLink() {
      const seed = document.getElementById("seedInput").value.trim();
      const rounds = document.getElementById("rounds").value;
      const matches = document.getElementById("matchesPerRound").value;
      const players = Array.from(document.querySelectorAll("#playerSelect input:checked")).map(cb => cb.value);

      const params = new URLSearchParams();
      params.set("seed", seed);
      params.set("rounds", rounds);
      params.set("matches", matches);
      params.set("players", players.join(","));

      const url = window.location.origin + window.location.pathname + "?" + params.toString();
      navigator.clipboard.writeText(url).then(() => {
        alert("Посилання скопійовано:\n" + url);
      });
    }

    // ===============================
    // 6) Завантаження з URL + авто‑seed
    // ===============================
    (function loadFromURL() {
      const params = new URLSearchParams(window.location.search);

      if (params.has("seed")) {
        document.getElementById("seedInput").value = params.get("seed");
      } else {
        generateRandomSeed(); // автогенерація seed
      }

      if (params.has("rounds")) document.getElementById("rounds").value = params.get("rounds");
      if (params.has("matches")) document.getElementById("matchesPerRound").value = params.get("matches");

      if (params.has("players")) {
        const list = params.get("players").split(",");
        for (const name of list) {
          const cb = document.querySelector(`#playerSelect input[value="${name}"]`);
          if (cb) cb.checked = true;
        }
      }

      // Якщо seed у URL — автоматично згенеруємо розклад
      if (params.has("seed")) generate();
    })();
  </script>
</body>
</html>
